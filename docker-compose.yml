
services:
  postgres-db:
    image: postgres:16-alpine
    container_name: sentinela-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinela-network

volumes:
  postgres_data:

networks:
  sentinela-network:
    driver: bridge